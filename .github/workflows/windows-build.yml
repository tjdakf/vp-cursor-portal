name: Windows Build

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - codex-initial-mvp
    tags:
      - 'v*'
  pull_request:

permissions:
  contents: write

jobs:
  build-test-publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Compute build metadata
        shell: pwsh
        run: |
          $version = "0.1.6"
          if ("${{ github.ref_type }}" -eq "tag" -and "${{ github.ref_name }}" -match '^v(.+)$') {
            $version = $Matches[1]
          }
          $fileVersion = ($version -split '[-+]')[0]
          $versionParts = $fileVersion.Split('.')
          if ($versionParts.Length -eq 3) {
            $fileVersion = "$fileVersion.0"
          } elseif ($versionParts.Length -ne 4) {
            $fileVersion = "0.1.6.0"
          }
          "APP_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APP_FILE_VERSION=$fileVersion" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "APP_INFORMATIONAL_VERSION=$version+${{ github.sha }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Restore
        run: dotnet restore H2CursorRouter.sln

      - name: Build
        shell: pwsh
        run: |
          dotnet build H2CursorRouter.sln `
            --configuration Release `
            --no-restore `
            -p:Version=$env:APP_VERSION `
            -p:AssemblyVersion=$env:APP_FILE_VERSION `
            -p:FileVersion=$env:APP_FILE_VERSION `
            -p:InformationalVersion=$env:APP_INFORMATIONAL_VERSION

      - name: Test
        run: dotnet test H2CursorRouter.sln --configuration Release --no-build

      - name: Publish Windows app
        shell: pwsh
        run: |
          dotnet publish src\H2CursorRouter.App\H2CursorRouter.App.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            -p:Version=$env:APP_VERSION `
            -p:AssemblyVersion=$env:APP_FILE_VERSION `
            -p:FileVersion=$env:APP_FILE_VERSION `
            -p:InformationalVersion=$env:APP_INFORMATIONAL_VERSION `
            --output artifacts\vp-cursor-portal-win-x64

      - name: Install Inno Setup
        run: choco install innosetup --yes

      - name: Build installer
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force artifacts\installer | Out-Null
          $publishDir = (Resolve-Path artifacts\vp-cursor-portal-win-x64).Path
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" "/DPublishDir=$publishDir" "/DMyAppVersion=$env:APP_VERSION" installer\inno\vp-cursor-portal.iss

      - name: Create release zip
        shell: pwsh
        run: |
          Compress-Archive -Path artifacts\vp-cursor-portal-win-x64\* -DestinationPath artifacts\vp-cursor-portal-win-x64.zip -Force

      - name: Upload Windows zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: vp-cursor-portal-win-x64
          path: artifacts\vp-cursor-portal-win-x64

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: vp-cursor-portal-setup
          path: artifacts/installer/vp-cursor-portal-setup.exe

      - name: Upload GitHub Release assets
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          overwrite_files: true
          files: |
            artifacts/vp-cursor-portal-win-x64.zip
            artifacts/installer/vp-cursor-portal-setup.exe
          body_path: docs/releases/${{ github.ref_name }}.md
